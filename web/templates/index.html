<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色对话统计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            display: none;
        }

        .result-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
        }

        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .stats-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .day-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: bold;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 10px;
        }

        .stats-table thead {
            background: #f8f9ff;
        }

        .stats-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
            border-bottom: 2px solid #e0e0e0;
        }

        .stats-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .stats-table tbody tr:hover {
            background: #f8f9ff;
        }

        .stats-table tbody tr:last-child td {
            border-bottom: none;
        }

        .reset-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 20px auto;
        }

        .reset-btn:hover {
            background: #667eea;
            color: white;
        }

        .error-message {
            background: #ff4757;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .upload-section {
                padding: 20px;
            }

            .stats-table {
                font-size: 0.9em;
            }

            .stats-table th,
            .stats-table td {
                padding: 8px;
            }

            .result-header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 角色对话统计工具</h1>
            <p>上传日志文件，自动分析角色对话统计数据</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击或拖拽上传日志文件</div>
                <div class="upload-hint">支持 .txt 格式，最大 16MB</div>
            </div>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在分析日志文件，请稍候...</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="result-header">
                <div class="result-title" id="resultTitle">统计结果</div>
                <button class="download-btn" id="downloadBtn">📥 下载 Excel 报告</button>
            </div>

            <div id="statsContent"></div>

            <button class="reset-btn" id="resetBtn">🔄 重新上传</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadSection = document.getElementById('uploadSection');
        const loading = document.getElementById('loading');
        const resultsSection = document.getElementById('resultsSection');
        const statsContent = document.getElementById('statsContent');
        const resultTitle = document.getElementById('resultTitle');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const errorMessage = document.getElementById('errorMessage');

        let downloadId = '';
        let excelFilename = '';

        // 点击上传区域
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadFile(file);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                uploadFile(file);
            }
        });

        // 上传文件
        async function uploadFile(file) {
            if (!file.name.endsWith('.txt')) {
                showError('只支持 .txt 格式的日志文件');
                return;
            }

            hideError();
            uploadSection.style.display = 'none';
            loading.style.display = 'block';
            resultsSection.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // 保存下载信息
                downloadId = data.download_id;
                excelFilename = data.excel_filename;

                // 显示结果
                displayResults(data);

            } catch (error) {
                showError(error.message || '处理文件时出错');
                uploadSection.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        // 显示结果
        function displayResults(data) {
            loading.style.display = 'none';
            resultsSection.style.display = 'block';

            resultTitle.textContent = `📊 ${data.filename} - 统计结果`;

            statsContent.innerHTML = '';

            data.stats.forEach((dayData, index) => {
                const container = document.createElement('div');
                container.className = 'stats-container';

                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.textContent = dayData.day === '总计' ? '📈 总体统计' : `📅 ${dayData.day}`;
                container.appendChild(dayHeader);

                const table = document.createElement('table');
                table.className = 'stats-table';

                // 表头
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');

                const headers = Object.keys(dayData.stats[0]);
                headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });

                thead.appendChild(headerRow);
                table.appendChild(thead);

                // 表体
                const tbody = document.createElement('tbody');
                dayData.stats.forEach(stat => {
                    const row = document.createElement('tr');
                    headers.forEach(header => {
                        const td = document.createElement('td');
                        td.textContent = stat[header];
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });

                table.appendChild(tbody);
                container.appendChild(table);

                statsContent.appendChild(container);
            });
        }

        // 下载按钮
        downloadBtn.addEventListener('click', async () => {
            try {
                const response = await fetch(`/api/download/${downloadId}/${excelFilename}`);

                if (!response.ok) {
                    throw new Error('下载失败');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = excelFilename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                showError('下载文件时出错');
            }
        });

        // 重置按钮
        resetBtn.addEventListener('click', async () => {
            // 清理服务器上的文件
            if (downloadId && excelFilename) {
                try {
                    await fetch(`/api/cleanup/${downloadId}/${excelFilename}`, {
                        method: 'POST'
                    });
                } catch (error) {
                    console.error('清理文件失败', error);
                }
            }

            // 重置界面
            uploadSection.style.display = 'block';
            resultsSection.style.display = 'none';
            fileInput.value = '';
            downloadId = '';
            excelFilename = '';
            hideError();
        });

        // 错误处理
        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
